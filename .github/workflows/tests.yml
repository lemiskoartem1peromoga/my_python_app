name: Python tests
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run tests
        run: |
          pip install pytest
          # Цей рядок каже роботу шукати файл app.py в основній папці
          export PYTHONPATH=$PYTHONPATH:.
          pytest
